<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Phone Redirect</title>
</head>
<body>
  <p id="fallback">Redirecting...</p>

  <script>
    const basePath = "/phone_redirect/";
    const path = window.location.pathname;

    let phone = path.startsWith(basePath) ? path.slice(basePath.length) : "";
    phone = decodeURIComponent(phone).trim();

    if (phone) {
      window.location.replace(`tel:${phone}`);
    } else {
      document.getElementById("fallback").textContent = "Missing phone number in URL.";
    }
  </script>
</body>
</html>
